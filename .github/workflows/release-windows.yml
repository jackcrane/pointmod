name: Release Windows Build

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build pointmod for Windows
        shell: cmd
        run: call build-windows.bat

      - name: Package portable zip
        shell: pwsh
        run: |
          $exeCandidates = @(
            "build-windows/Release/pointmod.exe",
            "build-windows/pointmod.exe"
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exePath) {
            throw "pointmod.exe was not produced."
          }

          $stageDir = "dist/pointmod-windows-x64-portable"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item $exePath "$stageDir/pointmod.exe"
          Copy-Item README.md "$stageDir/README.md"

          $zipPath = "dist/pointmod-windows-x64-portable.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath
          }

          Compress-Archive -Path "$stageDir/*" -DestinationPath $zipPath
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload zip to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${env:ZIP_PATH}" --clobber
